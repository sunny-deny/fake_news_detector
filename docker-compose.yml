version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: fakenews_db
    environment:
      POSTGRES_DB: fakenews
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fakenews_network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fakenews_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/fakenews
      MODEL_DIR: /app/models/baseline
      MAX_LENGTH: 256
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
    volumes:
      - ./src:/app/src
      - ./models:/app/models
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn src.fakey.api.app:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - fakenews_network

  # pgAdmin (Optional - Database Management Tool)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fakenews_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fakenews.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - fakenews_network

volumes:
  postgres_data:

networks:
  fakenews_network:
    driver: bridge
